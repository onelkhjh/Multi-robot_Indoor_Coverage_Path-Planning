schema_version: "1.0"
name: Arbitrary indoor laboratory map
coordinates:
  kind: cartesian
  unit: m

# 실험실 외곽을 본뜬 임의의 비볼록 AOI (실측 도면 아님)
aoi:
  exterior:
    - [0.0, 0.0]
    - [11.5, 0.0]
    - [11.5, 3.0]
    - [9.0, 3.0]
    - [9.0, 5.5]
    - [12.5, 5.5]
    - [12.5, 9.0]
    - [6.5, 9.0]
    - [6.5, 7.5]
    - [3.0, 7.5]
    - [3.0, 10.0]
    - [0.0, 10.0]
  holes: []

# 책상, 장비 랙 등을 가정한 비행 금지 구역
no_fly_zones:
  - exterior:
      - [2.0, 1.5]
      - [4.2, 1.5]
      - [4.2, 3.2]
      - [2.0, 3.2]
    holes: []
  - exterior:
      - [6.0, 4.0]
      - [8.2, 4.0]
      - [8.2, 6.0]
      - [6.0, 6.0]
    holes: []
  - exterior:
      - [9.8, 6.5]
      - [11.5, 6.5]
      - [11.5, 8.0]
      - [9.8, 8.0]
    holes: []

nodes:
  - id: node-01
    position: [0.8, 0.8]
  - id: node-02
    position: [5.2, 0.8]
  - id: node-03
    position: [1.0, 8.8]
  - id: node-04
    position: [11.7, 8.5]

sensor:
  altitude_m: 0.8
  fov_deg: 60.0

grid:
  origin: [0.0, 0.0]
  boundary_policy: any_overlap
  perimeter_spacing_m: null
